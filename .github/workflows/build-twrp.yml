name: Build TWRP - UMIDIGI G7 Tab Pro

# This workflow assumes the device tree (this whole folder) lives at the
# ROOT of the repo it's placed in. It checks itself out, syncs the TWRP
# minimal manifest, drops the device tree into the right path, and builds.
#
# Trigger manually from the Actions tab (workflow_dispatch), or on push.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240 # minimal-manifest builds usually take 1-2h; well under the 6h GH Actions job limit

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device-tree-checkout

      - name: Free up disk space
        # GitHub-hosted runners ship with ~14GB free by default — not
        # enough headroom for an Android build tree. This reclaims
        # 20-30GB by removing preinstalled software this job doesn't use.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Increase swap
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig python3 python-is-python3 openjdk-8-jdk

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        # repo/AOSP build tooling expects these to be set, even in CI
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global color.ui false

      - name: repo init + sync (twrp-12.1 minimal manifest)
        run: |
          mkdir -p ~/twrp && cd ~/twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j$(nproc)

      - name: Place device tree
        run: |
          mkdir -p ~/twrp/device/umidigi
          cp -r "$GITHUB_WORKSPACE/device-tree-checkout" ~/twrp/device/umidigi/g7tabpro

      - name: Build
        run: |
          cd ~/twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_g7tabpro-eng
          mka vendorbootimage -j$(nproc)

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: twrp-g7tabpro
          path: |
            ~/twrp/out/target/product/g7tabpro/*.img
            ~/twrp/out/target/product/g7tabpro/*.zip
          if-no-files-found: warn
